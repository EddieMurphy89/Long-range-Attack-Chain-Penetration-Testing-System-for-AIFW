services:
  aifw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vulhub-aifw
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.route_localnet=1
    environment:
      - TZ=Asia/Shanghai
      # Comma-separated list of HTTP ports to intercept via ModSecurity
      - INTERCEPT_PORTS=80,8080,8443,8888,9000,3000,4848,7474,8161,8983,9090,9200
      - MODSEC_RULE_ENGINE=${MODSEC_RULE_ENGINE:-DetectionOnly}
    ports:
      - "${AIFW_PORT:-9999}:9999"
      # Expose dynamic intercept ports range
      - "10001-10010:10001-10010"
    networks:
      vulhub_net_dmz_a:
        ipv4_address: 192.168.6.254
      vulhub_net_db_b:
        ipv4_address: 192.168.5.254
    restart: unless-stopped
    labels:
      - "com.vulhub.role=aifw"

networks:
  vulhub_net_dmz_a:
    external: true
  vulhub_net_db_b:
    external: true
