# # ==============================================
# # ModSecurity Override Configuration for AIFW
# # ==============================================
# # This file is loaded AFTER the OWASP CRS rules.
# # It overrides the engine mode and audit log settings.
# # Engine mode: DetectionOnly = log but don't block
# # Change to "On" to actually block malicious requests

# SecRuleEngine DetectionOnly

# # Audit log settings - JSON format for easy parsing
# # FORCE LOGGING of all transactions, even if not blocked (200 OK responses in DetectionOnly mode)
# # Default 'RelevantOnly' often drops 200 OK logs unless SecAuditLogRelevantStatus is tuned.

# SecAuditEngine On
# SecAuditLogRelevantStatus "^(?:5|4(?!04))"

# # Ensure 'C' (Request Body) is included

# SecAuditLogParts ABCEFHZ
# SecAuditLogType Serial
# SecAuditLog /var/log/modsecurity/audit.log
# SecAuditLogFormat JSON

# # Lower the anomaly threshold for more sensitive detection
# # Default CRS inbound threshold is 5; we lower to 3 for research purposes
# SecAction "id:900110,phase:1,pass,t:none,nolog,setvar:tx.inbound_anomaly_score_threshold=3"
# SecAction "id:900111,phase:1,pass,t:none,nolog,setvar:tx.outbound_anomaly_score_threshold=3"

# # Paranoia Level 2 (more aggressive detection)
# SecAction "id:900000,phase:1,pass,t:none,nolog,setvar:tx.blocking_paranoia_level=2"
