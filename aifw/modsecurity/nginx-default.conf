# AIFW Nginx configuration
# This is the base config. Dynamic server blocks for intercepting
# specific targets are added by the backend via docker exec.

server {
    listen 9999;
    server_name _;

    # Health check / status endpoint (no ModSecurity)
    location /aifw-health {
        modsecurity off;
        return 200 '{"status":"ok","service":"aifw-gateway"}';
        add_header Content-Type application/json;
    }

    # Default: 404 for unrouted requests
    location / {
        return 404 '{"error":"no intercept rule for this port"}';
        add_header Content-Type application/json;
    }
}

